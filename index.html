<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de accesorios - Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
  <header class="main-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
      <div class="d-flex align-items-center gap-2">
        <img src="imagenes/cellPoint.png" class="logo-img" alt="CellPoint">
      </div>
      <nav class="main-nav d-flex align-items-center gap-3">
        <a href="index.html" class="nav-link active">Productos</a>
        <a href="carrito.html" class="nav-link nav-cart-link">
          Carrito
          <span id="contador-carrito-header" class="badge bg-primary ms-1 d-none d-sm-inline">0</span>
        </a>
      </nav>
    </div>
    <div class="header-search">
      <div class="container py-2">
        <input
          type="text"
          id="buscador-productos"
          class="form-control search-input"
          placeholder="Buscar productos">
      </div>
    </div>
  </header>

  <main class="container py-4 productos-layout">
    <h1 class="h4 mb-3 text-center text-md-start">Productos</h1>
    <div class="row">
      <aside class="col-md-3 mb-4 mb-md-0">
        <section class="card shadow-sm mb-3">
          <div class="card-header small fw-semibold">Categorías</div>
          <div class="list-group list-group-flush" id="lista-categorias">
            <button type="button" class="list-group-item list-group-item-action" data-categoria="Celulares">Celulares</button>
            <button type="button" class="list-group-item list-group-item-action" data-categoria="Fundas">Fundas</button>
            <button type="button" class="list-group-item list-group-item-action" data-categoria="Auriculares">Auriculares</button>
            <button type="button" class="list-group-item list-group-item-action" data-categoria="Cargadores">Cargadores</button>
            <button type="button" class="list-group-item list-group-item-action" data-categoria="Smartwatch">Smartwatch</button>
            <button type="button" class="list-group-item list-group-item-action" data-categoria="Soportes">Soportes</button>
          </div>
        </section>

        <section class="card shadow-sm">
          <div class="card-header small fw-semibold">Marcas</div>
          <div class="list-group list-group-flush" id="lista-marcas">
            <button type="button" class="list-group-item list-group-item-action active" data-marca="Todos">Todos</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Motorola">Motorola</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Samsung">Samsung</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Apple">Apple</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Huawei">Huawei</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Xiaomi">Xiaomi</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="LG">LG</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Lenovo">Lenovo</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Sony">Sony</button>
            <button type="button" class="list-group-item list-group-item-action" data-marca="Nokia">Nokia</button>
          </div>
        </section>
      </aside>

      <section class="col-md-9">
        <section class="card shadow-sm">
          <div class="card-body">
            <p id="mensaje-estado-productos" class="text-muted small mb-3">
              Mostrando todos los productos disponibles.
            </p>
            <div id="lista-productos" class="row g-3">
              <!-- Productos generados -->
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <footer class="py-3 border-top mt-4">
    <div class="container text-center small text-muted">
      <img src="imagenes/cellPoint.png" class="logo-img" alt="CellPoint">
    </div>
  </footer>

  <script defer src="js/main.js"></script>
</body>
</html>
