<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de accesorios - Carrito</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
  <header class="main-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
      <div class="d-flex align-items-center gap-2">
        <img src="imagenes/cellPoint.png" class="logo-img" alt="CellPoint">
      </div>
      <nav class="main-nav d-flex align-items-center gap-3">
        <a href="index.html" class="nav-link">Productos</a>
        <a href="carrito.html" class="nav-link nav-cart-link active">
          Carrito
          <span id="contador-carrito-header" class="badge bg-primary ms-1 d-none d-sm-inline">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container py-4 carrito-layout">
    <h1 class="h4 mb-3 text-center text-md-start">Carrito de compras</h1>
    <div class="row g-4">
      <section class="col-md-8">
        <section class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between mb-3">
              <h2 class="h6 mb-2 mb-md-0">Productos en el carrito</h2>
              <button id="boton-vaciar-carrito" class="btn btn-outline-danger btn-sm">
                Vaciar carrito
              </button>
            </div>

            <p id="mensaje-estado-carrito" class="text-muted small mb-3">
              Cargando carrito...
            </p>

            <div id="lista-carrito" class="list-group carrito-lista">
              <!-- Productos del carrito generados -->
            </div>
          </div>
        </section>
      </section>

      <aside class="col-md-4">
        <section class="card shadow-sm resumen-card">
          <div class="card-body">
            <h2 class="h6 mb-3">Resumen de compra</h2>

            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted small">Subtotal</span>
              <span id="subtotal-carrito" class="small">$0</span>
            </div>

            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted small">Envío</span>
              <span class="small">Gratis</span>
            </div>

            <hr>

            <div class="d-flex justify-content-between mb-3">
              <span class="fw-semibold">Total</span>
              <span id="total-carrito" class="fw-bold">$0</span>
            </div>

            <button class="btn btn-primary w-100 mb-2" id="boton-finalizar">
              Finalizar compra (simulada)
            </button>
            <a href="index.html" class="btn btn-outline-secondary w-100 btn-sm">
              Seguir comprando
            </a>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <footer class="py-3 border-top mt-4">
    <div class="container text-center small text-muted">
      <img src="imagenes/cellPoint.png" class="logo-img" alt="CellPoint">
    </div>
  </footer>

  <script defer src="js/main.js"></script>
</body>
</html>
